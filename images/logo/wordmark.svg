<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" role="img" aria-label="Andrew의 아일랜드 동행 — Beautiful Ireland with Everyone">
  <defs>
    <linearGradient id="wm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10905F"/>
      <stop offset="100%" stop-color="#0A5E3E"/>
    </linearGradient>
    <linearGradient id="wm-leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4EDE0"/>
    </linearGradient>
  </defs>

  <!-- Icon mark -->
  <g transform="translate(10,10)">
    <rect width="120" height="120" rx="28" fill="url(#wm-bg)"/>
    <g transform="translate(60,57)" fill="url(#wm-leaf)">
      <g transform="translate(0,-18)">
        <path d="M0,0 C-1,-6 -10,-11 -14,-6 C-19,0 -14,9 -6,10 C-3,11 0,14 0,14 C0,14 3,11 6,10 C14,9 19,0 14,-6 C10,-11 1,-6 0,0 Z"/>
      </g>
      <g transform="rotate(-120) translate(0,-18)">
        <path d="M0,0 C-1,-6 -10,-11 -14,-6 C-19,0 -14,9 -6,10 C-3,11 0,14 0,14 C0,14 3,11 6,10 C14,9 19,0 14,-6 C10,-11 1,-6 0,0 Z"/>
      </g>
      <g transform="rotate(120) translate(0,-18)">
        <path d="M0,0 C-1,-6 -10,-11 -14,-6 C-19,0 -14,9 -6,10 C-3,11 0,14 0,14 C0,14 3,11 6,10 C14,9 19,0 14,-6 C10,-11 1,-6 0,0 Z"/>
      </g>
      <path d="M0,5 Q-2,18 5,32" stroke="#F4EDE0" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    </g>
  </g>

  <!-- Wordmark text -->
  <g transform="translate(150,0)" font-family="'Noto Sans KR', 'Helvetica Neue', sans-serif">
    <text x="0" y="58" font-size="32" font-weight="900" fill="#0B5E3F" letter-spacing="-0.5">아일랜드 동행</text>
    <text x="0" y="86" font-size="14" font-weight="600" fill="#0B6E4F" letter-spacing="2" opacity="0.85">BEAUTIFUL IRELAND</text>
    <text x="0" y="104" font-size="14" font-weight="600" fill="#0B6E4F" letter-spacing="2" opacity="0.85">WITH EVERYONE</text>
    <text x="0" y="128" font-size="12" font-weight="500" fill="#5A6B66">서현 Andrew · Dublin</text>
  </g>
</svg>
