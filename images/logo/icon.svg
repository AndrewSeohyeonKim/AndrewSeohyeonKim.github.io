<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Andrew의 아일랜드 동행 — 로고 아이콘">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10905F"/>
      <stop offset="100%" stop-color="#0A5E3E"/>
    </linearGradient>
    <linearGradient id="leaf-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4EDE0"/>
    </linearGradient>
  </defs>

  <!-- Rounded green badge -->
  <rect width="200" height="200" rx="44" fill="url(#bg-gradient)"/>

  <!-- Subtle Ireland silhouette watermark (very faint) -->
  <g opacity="0.08" fill="#FFFFFF">
    <path d="M58,38 C50,40 48,52 52,62 C44,68 42,82 50,90 C42,98 44,112 52,118 C46,128 50,140 60,144 C66,156 80,160 92,156 C100,164 116,164 124,156 C138,158 150,148 150,134 C158,128 160,114 152,106 C160,96 156,80 146,76 C148,64 140,52 128,52 C122,42 108,38 96,42 C84,36 68,36 58,38 Z"/>
  </g>

  <!-- Shamrock (three heart-shaped leaves + stem) -->
  <g transform="translate(100,96)" fill="url(#leaf-gradient)">
    <!-- Top leaf -->
    <g transform="translate(0,-30)">
      <path d="M0,0 C-2,-10 -16,-18 -22,-10 C-30,0 -22,14 -10,16 C-4,18 0,22 0,22 C0,22 4,18 10,16 C22,14 30,0 22,-10 C16,-18 2,-10 0,0 Z"/>
    </g>
    <!-- Left leaf (rotated -120deg around center) -->
    <g transform="rotate(-120) translate(0,-30)">
      <path d="M0,0 C-2,-10 -16,-18 -22,-10 C-30,0 -22,14 -10,16 C-4,18 0,22 0,22 C0,22 4,18 10,16 C22,14 30,0 22,-10 C16,-18 2,-10 0,0 Z"/>
    </g>
    <!-- Right leaf (rotated 120deg around center) -->
    <g transform="rotate(120) translate(0,-30)">
      <path d="M0,0 C-2,-10 -16,-18 -22,-10 C-30,0 -22,14 -10,16 C-4,18 0,22 0,22 C0,22 4,18 10,16 C22,14 30,0 22,-10 C16,-18 2,-10 0,0 Z"/>
    </g>
    <!-- Stem -->
    <path d="M0,8 Q-4,28 8,52" stroke="#F4EDE0" stroke-width="6" stroke-linecap="round" fill="none"/>
  </g>
</svg>
